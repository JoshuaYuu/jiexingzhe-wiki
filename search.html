        .search-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .search-box-large {
            position: relative;
            margin-bottom: 32px;
        }

        .search-box-large input {
            width: 100%;
            padding: 16px 24px 16px 56px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 1.125rem;
            transition: all 0.3s;
        }

        .search-box-large input:focus {
            outline: none;
            border-color: var(--boundary-cyan);
            box-shadow: var(--shadow-glow-cyan);
        }

        .search-box-large::before {
            content: "🔍";
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.25rem;
        }

        .search-filters {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-filter {
            padding: 8px 16px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-filter:hover {
            border-color: var(--boundary-cyan);
            color: var(--boundary-cyan);
        }

        .search-filter.active {
            background: rgba(34, 211, 238, 0.15);
            border-color: var(--boundary-cyan);
            color: var(--boundary-cyan);
        }

        .search-stats {
            color: var(--text-tertiary);
            font-size: 0.875rem;
            margin-bottom: 16px;
        }

        .search-results {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .search-result {
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .search-result:hover {
            border-color: var(--boundary-cyan);
            transform: translateX(8px);
            box-shadow: var(--shadow-glow-cyan);
        }

        .search-result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .search-result-icon {
            font-size: 1.5rem;
        }

        .search-result-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .search-result-category {
            margin-left: auto;
            font-size: 0.75rem;
            padding: 4px 10px;
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            color: var(--text-tertiary);
        }

        .search-result-desc {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .search-result-match {
            font-size: 0.875rem;
            color: var(--boundary-cyan);
        }

        .search-result-match::before {
            content: "匹配: ";
            color: var(--text-tertiary);
        }

        .no-results {
            text-align: center;
            padding: 48px;
            color: var(--text-tertiary);
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .search-suggestions {
            margin-top: 32px;
        }

        .search-suggestions h4 {
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-size: 0.875rem;
        }

        .suggestion-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .suggestion-tag {
            padding: 8px 16px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;

        .suggestion-tag:hover {
            border-color: var(--yang-gold);
            color: var(--yang-gold);
        }

        .highlight {
            background: rgba(34, 211, 238, 0.3);
            padding: 0 4px;
            border-radius: 4px;
        }
    </style>

            { id: 'fengdu', name: '酆都鬼城', category: 'faction', icon: '👑', desc: '阴界统治中心，十位阎君各自为政', url: 'factions.html#fengdu', keywords: ['酆都', '鬼城', '阴界', '阎君'] },

            { id: 'jieyao', name: '界钥', category: 'term', icon: '🗝️', desc: '开启两界通道的关键物品', url: 'world.html#terms', keywords: ['界钥', '钥匙', '通道'] },

            { id: 'yangrealm', name: '阳界', category: 'term', icon: '☀️', desc: '生者世界，现实世界', url: 'world.html#yang-realm', keywords: ['阳界', '生者', '现实'] },
            { id: 'yinrealm', name: '阴界', category: 'term', icon: '🌙', desc: '亡者归宿，鬼魂世界', url: 'world.html#yin-realm', keywords: ['阴界', '亡者', '鬼魂'] },
            { id: 'chaosrealm', name: '混沌界', category: 'term', icon: '🌑', desc: '两界未分时的原始状态', url: 'world.html#chaos-realm', keywords: ['混沌', '原始'] },

            // 职业
            { id: 'guandao', name: '观道', category: 'term', icon: '👁️', desc: '侦查/辅助/控场职业', url: 'system.html#guandao', keywords: ['观道', '侦查', '辅助'] },
            { id: 'yudao', name: '御道', category: 'term', icon: '🛡️', desc: '坦克/保护/控制职业', url: 'system.html#yudao', keywords: ['御道', '坦克', '防御'] },
            { id: 'shadao', name: '杀道', category: 'term', icon: '⚔️', desc: '输出/爆发/斩杀职业', url: 'system.html#shadao', keywords: ['杀道', '输出', '攻击'] },

            { id: 'tongdao', name: '通道', category: 'term', icon: '🌀', desc: '机动/支援/战术职业', url: 'system.html#tongdao', keywords: ['通道', '机动', '传送'] },

            // 地点
            { id: 'eastasia', name: '东亚分部', category: 'location', icon: '🌸', desc: '东京/上海双总部，赛博朋克风格', url: 'map.html#east-asia', keywords: ['东亚', '东京', '上海', '分部'] },
            { id: 'northamerica', name: '北美分部', category: 'location', icon: '🗽', desc: '纽约分部，百鬼熔炉', url: 'map.html#north-america', keywords: ['北美', '纽约', '分部'] },
            { id: 'europe', name: '欧洲分部', category: 'location', icon: '❄️', desc: '雷克雅未克分部，北欧神话风格', url: 'map.html#europe', keywords: ['欧洲', '雷克雅未克', '冰岛'] },

            // 章节
            { id: 'chapter1', name: '第一章：东亚篇', category: 'term', icon: '🌸', desc: '数据幽灵，科技与古老的碰撞', url: 'story.html#chapter1', keywords: ['第一章', '东亚篇', '数据幽灵'] },
            { id: 'chapter2', name: '第二章：北美篇', category: 'term', icon: '🗽', desc: '百鬼熔炉，多元文化碰撞', url: 'story.html#chapter2', keywords: ['第二章', '北美篇', '百鬼熔炉'] },
            { id: 'final', name: '最终章', category: 'term', icon: '🔥', desc: '两界归一，最终决战', url: 'story.html#final', keywords: ['最终章', '决战', '结局'] },
        ];

        let currentCategory = 'all';
        let searchQuery = '';

        // 搜索输入监听
        document.getElementById('searchInput').addEventListener('input', function(e) {
            searchQuery = e.target.value.trim();
            performSearch();
        });

        // 执行搜索
        function performSearch() {
            const resultsContainer = document.getElementById('searchResults');
            const statsContainer = document.getElementById('searchStats');

            if (!searchQuery) {
                showDefaultSuggestions();
                return;
            }

            // 过滤结果
            let results = searchIndex.filter(item => {
                // 分类筛选
                if (currentCategory !== 'all' && item.category !== currentCategory) {
                    return false;
                }
                // 关键词匹配
                return item.keywords.some(kw => kw.toLowerCase().includes(searchQuery.toLowerCase())) ||
                       item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                       item.desc.toLowerCase().includes(searchQuery.toLowerCase());
            });

            // 更新统计
            statsContainer.textContent = `找到 ${results.length} 个结果`;

            // 显示结果
            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">😕</div>
                        <p>没有找到与 "${searchQuery}" 相关的内容</p>
                        <p style="font-size: 0.875rem; margin-top: 8px;">试试其他关键词？</p>
                    </div>
                `;
            } else {
                resultsContainer.innerHTML = results.map(item => `
                    <a href="${item.url}" class="search-result">
                        <div class="search-result-header">
                            <span class="search-result-icon">${item.icon}</span>
                            <span class="search-result-title">${highlightMatch(item.name)}</span>
                            <span class="search-result-category">${getCategoryName(item.category)}</span>
                        </div>
                        <div class="search-result-desc">${highlightMatch(item.desc)}</div>
                        <div class="search-result-match">${item.keywords.slice(0, 5).join(', ')}</div>
                    </a>
                `).join('');
            }
        }

        // 高亮匹配文本
        function highlightMatch(text) {
            if (!searchQuery) return text;
            const regex = new RegExp(`(${searchQuery})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // 获取分类名称
        function getCategoryName(category) {
            const names = {
                'character': '角色',
                'faction': '势力',
                'term': '术语',
                'location': '地点'
            };
            return names[category] || category;
        }

        // 分类筛选
        function filterByCategory(category) {
            currentCategory = category;

            // 更新按钮状态
            document.querySelectorAll('.search-filter').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === category) {
                    btn.classList.add('active');
                }
            });

            // 更新侧边栏
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            performSearch();
        }

        // 快速搜索
        function quickSearch(term) {
            document.getElementById('searchInput').value = term;
            searchQuery = term;
            performSearch();
        }

        // 显示默认建议
        function showDefaultSuggestions() {
            document.getElementById('searchStats').textContent = '输入关键词开始搜索';
            document.getElementById('searchResults').innerHTML = `
                <div class="search-suggestions">
                    <h4>🔥 热门搜索</h4>
                    <div class="suggestion-tags">
                        <span class="suggestion-tag" onclick="quickSearch('林夕')">林夕</span>
