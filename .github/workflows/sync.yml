name: Auto Sync from Gist

on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟检查
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Download from Gist
        run: |
          curl -L -o index.html https://gist.githubusercontent.com/JoshuaYuu/a57391240c66293031afbc27c598008e/raw/
          cat index.html | head -20
      
      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
      
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add index.html
          git status
          git commit -m "Auto sync from Gist $(date)" || echo "No changes to commit"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git || echo "Push failed"
